name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: buf lint
        run: buf lint

      - name: buf format
        run: buf format --diff --exit-code

      - name: kubebuilder-protovalidate sync
        run: ./scripts/lint-model-validate.sh

  breaking:
    name: Breaking change detection
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'skip-breaking')
    steps:
      - uses: actions/checkout@v4

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: buf breaking
        run: buf breaking --against '.git#branch=${{ github.base_ref }}'

  generate:
    name: Generated code sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Generate Go code
        run: buf generate --template buf.gen.ci.yaml

      - name: Check generated Go code is up to date
        run: |
          if ! git diff --exit-code coreapi/go/; then
            echo ""
            echo "Generated Go code is out of date."
            echo "Run 'make generate' and commit the result."
            exit 1
          fi

  openapi-gen-smoke:
    name: OpenAPI generation smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Install ch-protoc-gen-openapi
        run: |
          go install github.com/channel-io/ch-protoc-gen-openapi@v0.1.8
          ln -sf "$(go env GOPATH)/bin/ch-protoc-gen-openapi" "$(go env GOPATH)/bin/protoc-gen-openapi"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Export proto deps
        run: |
          mkdir -p .proto-deps
          buf export . -o .proto-deps

      - name: Generate OpenAPI schemas (smoke — rejects invalid kubebuilder:example literals)
        run: |
          mkdir -p .openapi-out
          protoc -I .proto-deps -I /usr/include \
            --openapi_out=yaml=true,split_schemas=true,include_description=true,enum_strip_prefix=true,enum_skip_unspecified=true:.openapi-out \
            .proto-deps/coreapi/model/*.proto \
            .proto-deps/coreapi/common/*.proto

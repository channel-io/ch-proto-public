syntax = "proto3";

package coreapi.service;

import "buf/validate/validate.proto";
import "coreapi/model/plugin.proto";
import "google/protobuf/field_mask.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/service";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.service";

// Retrieves a list of plugins.
//
// The number of plugins retrieved is restricted by the limit parameter,
// and is capped to values in the closed interval [1, 500].
// Pagination is cursor-based. Pass the nextCursor value from the previous response
// as the cursor parameter to retrieve the next page.
// If the cursor parameter is left empty, the list starts with the
// earliest created plugin.
//
// Results are sorted by createdAt in ascending order.
message SearchPluginsRequest {
  // Channel ID to search plugins in.
  string channel_id = 1 [(buf.validate.field).required = true];

  // Opaque pagination cursor from a previous response.
  string cursor = 2;

  // Maximum number of results to return. Defaults to 25 if unset.
  int32 limit = 3 [(buf.validate.field).cel = {
    id: "int32.between"
    message: "limit must be between 1 and 500"
    expression: "this == 0 || (this >= 1 && this <= 500)"
  }];
}

// Response for plugin list retrieval.
message SearchPluginsResult {
  repeated coreapi.model.Plugin plugins = 1;

  // Opaque cursor for the next page.
  // Use has_next to determine whether another page exists.
  //
  // +kubebuilder:validation:Nullable
  string next_cursor = 2;

  // Whether a next page of results exists.
  bool has_next = 3;
}

// Retrieves a single plugin.
message GetPluginRequest {
  // Plugin ID to retrieve.
  string plugin_id = 1 [(buf.validate.field).required = true];

  // Channel ID the plugin belongs to.
  string channel_id = 2 [(buf.validate.field).required = true];
}

// Response for single plugin retrieval.
message GetPluginResult {
  coreapi.model.Plugin plugin = 1;
}

// Patches a plugin.
//
// PATCH semantics per RFC 7396 / AIP-134/161:
//   - a field listed in update_mask is applied (null = clear, value = set)
//   - a field absent from update_mask is not modified
message PatchPluginRequest {
  // Plugin ID to update.
  string plugin_id = 1 [(buf.validate.field).required = true];

  // Channel ID the plugin belongs to.
  string channel_id = 2 [(buf.validate.field).required = true];

  // Patch body. Only fields listed in update_mask are applied.
  PatchPluginBody body = 3 [(buf.validate.field).required = true];

  // Set of field paths (relative to PatchPluginBody) to update.
  // Unlisted fields remain unchanged.
  google.protobuf.FieldMask update_mask = 4 [(buf.validate.field).required = true];

  message PatchPluginBody {
    // Plugin display name.
    //
    // +kubebuilder:validation:Nullable
    // +kubebuilder:validation:MinLength=1
    // +kubebuilder:validation:MaxLength=30
    string name = 1 [(buf.validate.field).cel = {
      id: "string.maxLen"
      message: "value must be no more than 30 characters"
      expression: "this == '' || size(this) <= 30"
    }];

    // Visual theme of the widget.
    //
    // +kubebuilder:validation:Nullable
    coreapi.model.PluginAppearance appearance = 2;

    // Whether the label button is displayed on the widget.
    //
    // +kubebuilder:validation:Nullable
    bool label_button = 3;

    // Text displayed on the label button.
    //
    // +kubebuilder:validation:Nullable
    // +kubebuilder:validation:MinLength=4
    // +kubebuilder:validation:MaxLength=30
    string label_button_text = 4 [(buf.validate.field).cel = {
      id: "string.len"
      message: "value must be between 4 and 30 characters"
      expression: "this == '' || (size(this) >= 4 && size(this) <= 30)"
    }];

    // Internationalized label button text keyed by locale.
    // Each value must be between 4 and 30 characters.
    //
    // +kubebuilder:validation:Nullable
    map<string, string> label_button_text_i18n_map = 5;

    // Type of the launcher button.
    //
    // +kubebuilder:validation:Nullable
    coreapi.model.PluginButtonType button_type = 6;

    // Predefined icon for the launcher button.
    // Applicable when button_type is PLUGIN_BUTTON_TYPE_ICON_BUTTON.
    //
    // +kubebuilder:validation:Nullable
    coreapi.model.PluginIconButton icon_button = 7;

    // Horizontal margin in pixels for the desktop widget.
    //
    // +kubebuilder:validation:Nullable
    int32 desk_margin_x = 8;

    // Vertical margin in pixels for the desktop widget.
    //
    // +kubebuilder:validation:Nullable
    int32 desk_margin_y = 9;

    // Whether the launcher button is hidden on desktop.
    //
    // +kubebuilder:validation:Nullable
    bool desk_hide_button = 10;

    // Horizontal position of the widget on desktop.
    //
    // +kubebuilder:validation:Nullable
    coreapi.model.PluginPosition desk_position = 11;

    // Horizontal margin in pixels for the mobile widget.
    //
    // +kubebuilder:validation:Nullable
    int32 mobile_margin_x = 12;

    // Vertical margin in pixels for the mobile widget.
    //
    // +kubebuilder:validation:Nullable
    int32 mobile_margin_y = 13;

    // Horizontal position of the widget on mobile.
    //
    // +kubebuilder:validation:Nullable
    coreapi.model.PluginPosition mobile_position = 14;

    // Whether the launcher button is hidden on mobile.
    //
    // +kubebuilder:validation:Nullable
    bool mobile_hide_button = 15;

    // Vertical position of the chat bubble on mobile.
    //
    // +kubebuilder:validation:Nullable
    coreapi.model.PluginBubblePosition mobile_bubble_position = 16;

    // Ratio of website visitors who see the plugin widget.
    //
    // +kubebuilder:validation:Nullable
    // +kubebuilder:validation:Minimum=0
    // +kubebuilder:validation:Maximum=1
    float run_rate = 17 [
      (buf.validate.field).cel = {
        id: "float.gte"
        message: "value must be at least 0"
        expression: "this >= 0.0"
      },
      (buf.validate.field).cel = {
        id: "float.lte"
        message: "value must be at most 1"
        expression: "this <= 1.0"
      }
    ];

    // External image URL to use as the custom launcher button image.
    // Applicable when button_type is CUSTOM_IMAGE.
    //
    // +kubebuilder:validation:Nullable
    string custom_image_url = 18;
  }
}

// Response for plugin patch.
message PatchPluginResult {
  coreapi.model.Plugin plugin = 1;
}

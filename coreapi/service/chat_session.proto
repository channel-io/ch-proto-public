syntax = "proto3";

package coreapi.service;

import "buf/validate/validate.proto";
import "coreapi/model/chat_session.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/service";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.service";

// Retrieves a list of chat sessions for a given chat.
//
// Returns all participant sessions without pagination.
message SearchChatSessionsRequest {
  // Channel ID to search sessions in.
  string channel_id = 1 [(buf.validate.field).required = true];

  // Chat type to search sessions for (e.g. "userChat", "group").
  string chat_type = 2 [(buf.validate.field).required = true];

  // Chat ID to search sessions for.
  string chat_id = 3 [(buf.validate.field).required = true];
}

// Response for chat session list retrieval.
message SearchChatSessionsResult {
  repeated coreapi.model.ChatSession chat_sessions = 1;
}

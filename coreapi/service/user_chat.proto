syntax = "proto3";

package coreapi.service;

import "buf/validate/validate.proto";
import "coreapi/common/sort_order.proto";
import "coreapi/model/chat_bookmark.proto";
import "coreapi/model/chat_session.proto";
import "coreapi/model/message.proto";
import "coreapi/service/message_content.proto";
import "coreapi/model/user_chat.proto";
import "google/protobuf/duration.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/service";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.service";

// ============================================================
// UserChat CRUD + State Changes
// ============================================================

// Retrieves a list of managed user chats.
//
// The number of user chats retrieved is restricted by the limit parameter,
// and is capped to values in the closed interval [1, 500].
// Pagination is cursor-based. Pass the nextCursor value from the previous response
// as the cursor parameter to retrieve the next page.
// If the cursor parameter is left empty, the list starts from the beginning.
//
// Retrieved user chats can be filtered by state (opened, snoozed, closed).
// Defaults to opened if state is not specified.
message SearchUserChatsRequest {
  // Channel ID to search user chats in.
  string channel_id = 1 [(buf.validate.field).required = true];

  // Filter by user chat state.
  // Defaults to OPENED if unset.
  coreapi.model.UserChatState state = 2;

  // Sort order for results. Defaults to descending if unset.
  coreapi.common.SortOrder sort_order = 3;

  // Opaque pagination cursor from a previous response.
  string cursor = 4;

  // Maximum number of results to return. Defaults to 25 if unset.
  int32 limit = 5 [(buf.validate.field).cel = {
    id: "int32.between"
    message: "limit must be between 1 and 500"
    expression: "this == 0 || (this >= 1 && this <= 500)"
  }];
}

// Response for managed user chat list retrieval.
message SearchUserChatsResult {
  repeated coreapi.model.UserChat user_chats = 1;

  // Opaque cursor for the next page.
  // Use has_next to determine whether another page exists.
  //
  // +kubebuilder:validation:Nullable
  string next_cursor = 2;

  // Whether a next page of results exists.
  bool has_next = 3;
}

// Retrieves a list of user chats for a specific user.
//
// The number of user chats retrieved is restricted by the limit parameter,
// and is capped to values in the closed interval [1, 500].
// Pagination is cursor-based. Pass the nextCursor value from the previous response
// as the cursor parameter to retrieve the next page.
// If the cursor parameter is left empty, the list starts from the beginning.
message SearchUserChatsForUserRequest {
  // Channel ID to search user chats in.
  string channel_id = 1 [(buf.validate.field).required = true];

  // User ID to retrieve chats for.
  string user_id = 2 [(buf.validate.field).required = true];

  // Sort order for results. Defaults to descending if unset.
  coreapi.common.SortOrder sort_order = 3;

  // Opaque pagination cursor from a previous response.
  string cursor = 4;

  // Maximum number of results to return. Defaults to 25 if unset.
  int32 limit = 5 [(buf.validate.field).cel = {
    id: "int32.between"
    message: "limit must be between 1 and 500"
    expression: "this == 0 || (this >= 1 && this <= 500)"
  }];
}

// Response for user-scoped user chat list retrieval.
message SearchUserChatsForUserResult {
  repeated coreapi.model.UserChat user_chats = 1;

  // Opaque cursor for the next page.
  //
  // +kubebuilder:validation:Nullable
  string next_cursor = 2;

  // Whether a next page of results exists.
  bool has_next = 3;
}

// Retrieves a single user chat.
message GetUserChatRequest {
  // User chat ID to retrieve.
  string user_chat_id = 1 [(buf.validate.field).required = true];

  // Channel ID the user chat belongs to.
  string channel_id = 2 [(buf.validate.field).required = true];

  // Whether to include the chat bookmark.
  bool include_bookmark = 3;

  // Whether to include chat sessions (manager + user).
  bool include_sessions = 4;
}

// Response for single user chat retrieval.
message GetUserChatResult {
  coreapi.model.UserChat user_chat = 1;

  // Chat bookmark. Populated when include_bookmark is true.
  coreapi.model.ChatBookmark bookmark = 2;

  // Chat sessions. Populated when include_sessions is true.
  //
  // +kubebuilder:validation:Nullable
  repeated coreapi.model.ChatSession sessions = 3;
}

// Creates a new user chat for a user.
//
// Creates an outbound user chat initiated by the channel.
message CreateUserChatRequest {
  // Channel ID to create the user chat in.
  string channel_id = 1 [(buf.validate.field).required = true];

  // User ID to create the chat for.
  string user_id = 2 [(buf.validate.field).required = true];
}

// Response for user chat creation.
message CreateUserChatResult {
  coreapi.model.UserChat user_chat = 1;
}

// Updates a user chat.
//
// Only the description field can be updated.
// Empty string clears the description.
message UpdateUserChatRequest {
  // User chat ID to update.
  string user_chat_id = 1 [(buf.validate.field).required = true];

  // Channel ID the user chat belongs to.
  string channel_id = 2 [(buf.validate.field).required = true];

  // User chat description.
  string description = 3 [(buf.validate.field).cel = {
    id: "string.maxLen"
    message: "value must be no more than 1000 characters"
    expression: "size(this) <= 1000"
  }];
}

// Response for user chat update.
message UpdateUserChatResult {
  coreapi.model.UserChat user_chat = 1;
}

// Deletes a user chat.
//
// Returns 404 if the user chat does not exist.
message DeleteUserChatRequest {
  // User chat ID to delete.
  string user_chat_id = 1 [(buf.validate.field).required = true];

  // Channel ID the user chat belongs to.
  string channel_id = 2 [(buf.validate.field).required = true];
}

// Response for user chat deletion. Empty on success (204 No Content).
message DeleteUserChatResult {}

// Opens a user chat.
//
// Transitions the user chat state to opened.
// The bot specified by bot_name performs the action.
// Returns 404 if the user chat does not exist.
message OpenUserChatRequest {
  string user_chat_id = 1 [(buf.validate.field).required = true];
  string channel_id = 2 [(buf.validate.field).required = true];

  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:validation:MaxLength=30
  // +kubebuilder:validation:Pattern="^[^@#$%:/]+$"
  string bot_name = 3 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).cel = {
      id: "string.maxLen"
      message: "value must be no more than 30 characters"
      expression: "size(this) <= 30"
    },
    (buf.validate.field).string.pattern = "^[^@#$%:/]+$",
    (buf.validate.field).required = true
  ];
}

message OpenUserChatResult {
  coreapi.model.UserChat user_chat = 1;
}

// Closes a user chat.
message CloseUserChatRequest {
  string user_chat_id = 1 [(buf.validate.field).required = true];
  string channel_id = 2 [(buf.validate.field).required = true];

  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:validation:MaxLength=30
  // +kubebuilder:validation:Pattern="^[^@#$%:/]+$"
  string bot_name = 3 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).cel = {
      id: "string.maxLen"
      message: "value must be no more than 30 characters"
      expression: "size(this) <= 30"
    },
    (buf.validate.field).string.pattern = "^[^@#$%:/]+$",
    (buf.validate.field).required = true
  ];
}

message CloseUserChatResult {
  coreapi.model.UserChat user_chat = 1;
}

// Snoozes a user chat.
message SnoozeUserChatRequest {
  string user_chat_id = 1 [(buf.validate.field).required = true];
  string channel_id = 2 [(buf.validate.field).required = true];

  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:validation:MaxLength=30
  // +kubebuilder:validation:Pattern="^[^@#$%:/]+$"
  string bot_name = 3 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).cel = {
      id: "string.maxLen"
      message: "value must be no more than 30 characters"
      expression: "size(this) <= 30"
    },
    (buf.validate.field).string.pattern = "^[^@#$%:/]+$",
    (buf.validate.field).required = true
  ];

  // +kubebuilder:validation:Required
  google.protobuf.Duration duration = 4 [
    (buf.validate.field).cel = {
      id: "duration.gte"
      message: "duration must be at least 1 minute"
      expression: "this >= duration('60s')"
    },
    (buf.validate.field).required = true
  ];
}

message SnoozeUserChatResult {
  coreapi.model.UserChat user_chat = 1;
}

// Invites managers to a user chat.
message InviteManagersToUserChatRequest {
  string user_chat_id = 1 [(buf.validate.field).required = true];
  string channel_id = 2 [(buf.validate.field).required = true];

  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:validation:MaxLength=30
  // +kubebuilder:validation:Pattern="^[^@#$%:/]+$"
  string bot_name = 3 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).cel = {
      id: "string.maxLen"
      message: "value must be no more than 30 characters"
      expression: "size(this) <= 30"
    },
    (buf.validate.field).string.pattern = "^[^@#$%:/]+$",
    (buf.validate.field).required = true
  ];

  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinItems=1
  repeated string manager_ids = 4 [
    (buf.validate.field).cel = {
      id: "repeated.minItems"
      message: "at least one manager ID is required"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];
}

message InviteManagersToUserChatResult {
  coreapi.model.UserChat user_chat = 1;
}

// Assigns a manager to a user chat.
message AssignManagerToUserChatRequest {
  string user_chat_id = 1 [(buf.validate.field).required = true];
  string channel_id = 2 [(buf.validate.field).required = true];

  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:validation:MaxLength=30
  // +kubebuilder:validation:Pattern="^[^@#$%:/]+$"
  string bot_name = 3 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).cel = {
      id: "string.maxLen"
      message: "value must be no more than 30 characters"
      expression: "size(this) <= 30"
    },
    (buf.validate.field).string.pattern = "^[^@#$%:/]+$",
    (buf.validate.field).required = true
  ];

  string manager_id = 4 [(buf.validate.field).required = true];
}

message AssignManagerToUserChatResult {
  coreapi.model.UserChat user_chat = 1;
}

// ============================================================
// UserChat Sessions (chat_session 종속)
// ============================================================

// Retrieves a list of chat sessions for a user chat.
message SearchUserChatSessionsRequest {
  string channel_id = 1 [(buf.validate.field).required = true];
  string user_chat_id = 2 [(buf.validate.field).required = true];
}

message SearchUserChatSessionsResult {
  repeated coreapi.model.ChatSession chat_sessions = 1;
}

// ============================================================
// UserChat Messages (chat_message 종속)
// ============================================================

// Retrieves a list of messages in a user chat.
message SearchUserChatMessagesRequest {
  string channel_id = 1 [(buf.validate.field).required = true];
  string user_chat_id = 2 [(buf.validate.field).required = true];

  coreapi.common.SortOrder sort_order = 3;
  string cursor = 4;

  int32 limit = 5 [(buf.validate.field).cel = {
    id: "int32.between"
    message: "limit must be between 1 and 500"
    expression: "this == 0 || (this >= 1 && this <= 500)"
  }];
}

message SearchUserChatMessagesResult {
  repeated coreapi.model.Message messages = 1;

  // +kubebuilder:validation:Nullable
  string next_cursor = 2;

  bool has_next = 3;
}

// Sends a new message to a user chat.
message CreateUserChatMessageRequest {
  string channel_id = 1 [(buf.validate.field).required = true];
  string user_chat_id = 2 [(buf.validate.field).required = true];

  // +kubebuilder:validation:Required
  coreapi.service.MessageContent content = 3 [(buf.validate.field).required = true];

  // +kubebuilder:validation:Nullable
  // +kubebuilder:validation:MaxLength=30
  // +kubebuilder:validation:Pattern="^[^@#$%:/]+$"
  string bot_name = 4 [
    (buf.validate.field).cel = {
      id: "string.maxLen"
      message: "value must be no more than 30 characters"
      expression: "this == '' || size(this) <= 30"
    },
    (buf.validate.field).string.pattern = "^[^@#$%:/]+$"
  ];

  // +kubebuilder:validation:Nullable
  string request_id = 5;
}

message CreateUserChatMessageResult {
  coreapi.model.Message message = 1;
}

// ============================================================
// UserChat File URL (media 종속)
// ============================================================

// Retrieves a pre-signed URL for downloading a file attached to a user chat.
message GetUserChatFileUrlRequest {
  string channel_id = 1 [(buf.validate.field).required = true];
  string user_chat_id = 2 [(buf.validate.field).required = true];
  string key = 3 [(buf.validate.field).required = true];
}

message GetUserChatFileUrlResult {
  string url = 1;
}

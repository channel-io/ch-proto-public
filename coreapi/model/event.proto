syntax = "proto3";

package coreapi.model;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/model";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.model";

// Event represents a user-level tracking event.
// Events capture user actions such as page views, purchases, and custom interactions.
message Event {
  // ID of the user who triggered the event.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="69e86feadafa12609c34"
  string user_id = 1 [(buf.validate.field).required = true];

  // Unique event identifier.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="7683-PageView"
  string id = 2 [(buf.validate.field).required = true];

  // Channel ID this event belongs to.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="7683"
  string channel_id = 3 [(buf.validate.field).required = true];

  // Event name identifying the type of action (e.g., PageView, Purchase, SignUp).
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:validation:MaxLength=64
  // +kubebuilder:example="PageView"
  string name = 4 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).cel = {
      id: "string.maxLen"
      message: "value must be no more than 64 characters"
      expression: "size(this) <= 64"
    },
    (buf.validate.field).required = true
  ];

  // Custom key-value properties associated with the event (e.g., page URL, product ID, revenue).
  //
  google.protobuf.Struct property = 5;

  // Event creation timestamp.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="2025-07-15T09:30:00Z"
  google.protobuf.Timestamp created_at = 6 [(buf.validate.field).required = true];

  // Expiration timestamp after which the event may no longer be retrievable.
  //
  // +kubebuilder:example="2025-07-15T09:30:00Z"
  google.protobuf.Timestamp expire_at = 7;

  // Optimistic concurrency version counter.
  // Incremented on each update to detect conflicting writes.
  //
  // +kubebuilder:example="1"
  int64 version = 8;

  // Internationalized event name map keyed by locale (e.g., en, ko).
  // Populated only for system-defined events; custom events return no entries.
  //
  map<string, string> name_i18n_map = 9;
}

syntax = "proto3";

package coreapi.model;

import "buf/validate/validate.proto";
import "coreapi/model/message_content.proto";
import "coreapi/model/user_chat.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/model";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.model";

// Direction of a phone call relative to the channel.
// - INBOUND: Call received from an external caller.
// - OUTBOUND: Call initiated by a manager to an external number.
enum CallDirection {
  CALL_DIRECTION_UNSPECIFIED = 0;
  CALL_DIRECTION_INBOUND = 1;
  CALL_DIRECTION_OUTBOUND = 2;
}

// Current state of a phone call in its lifecycle.
// - WAITING: The call is ringing or queued, not yet answered.
// - ENGAGED: The call is actively connected between participants.
enum CallState {
  CALL_STATE_UNSPECIFIED = 0;
  CALL_STATE_WAITING = 1;
  CALL_STATE_ENGAGED = 2;
}

// CallLog represents a record of a phone call associated with a channel.
message CallLog {
  // Channel ID where the call occurred.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="ch-12345"
  string channel_id = 1 [(buf.validate.field).required = true];

  // Reason the call was missed.
  // Only present when the call ended without being answered.
  //
  MissedReason missed_reason = 2;

  // Whether the call was inbound (received) or outbound (initiated).
  //
  CallDirection direction = 3;

  // Current lifecycle state indicating whether the call is waiting or connected.
  //
  CallState state = 4;

  // Originating phone number or caller identifier.
  //
  // +kubebuilder:example="+821012345678"
  string from = 5;

  // Destination phone number or callee identifier.
  //
  // +kubebuilder:example="+821098765432"
  string to = 6;

  // Call creation timestamp.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="2026-04-28T09:30:00Z"
  google.protobuf.Timestamp created_at = 7 [(buf.validate.field).required = true];

  // Call last update timestamp.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="2026-04-28T09:35:00Z"
  google.protobuf.Timestamp updated_at = 8 [(buf.validate.field).required = true];

  // Timestamp when the call was answered and the conversation began.
  // Absent if the call was never answered.
  //
  // +kubebuilder:example="2026-04-28T09:30:00Z"
  google.protobuf.Timestamp engaged_at = 9;

  // Timestamp when the call ended and the connection was terminated.
  // Absent if the call is still active or was never connected.
  //
  // +kubebuilder:example="2026-04-28T10:30:00Z"
  google.protobuf.Timestamp closed_at = 10;

  // User chat ID linked to this call.
  // Present when the call is associated with a user chat conversation.
  //
  // +kubebuilder:example="uc-abc123"
  string user_chat_id = 11;

  // List of manager IDs who participated in or handled the call.
  //
  // +kubebuilder:example=["1234","5678"]
  repeated string manager_ids = 12;
}

// MeetMessage represents a speech-to-text transcription message within a meet session.
message MeetMessage {
  // Unique message identifier.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="meet-001"
  string id = 1 [(buf.validate.field).required = true];

  // Channel ID this message belongs to.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="ch-12345"
  string channel_id = 2 [(buf.validate.field).required = true];

  // Chat type of the parent conversation.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="userChat"
  string chat_type = 3 [(buf.validate.field).required = true];

  // Chat ID of the parent conversation.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="uc-abc123"
  string chat_id = 4 [(buf.validate.field).required = true];

  // Entity type of the message author (e.g., "manager", "user").
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="manager"
  string person_type = 5 [(buf.validate.field).required = true];

  // Entity ID of the message author.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="m-001"
  string person_id = 6 [(buf.validate.field).required = true];

  // Structured content blocks of the message.
  //
  repeated coreapi.model.Block blocks = 7;

  // Plain text representation of the message.
  //
  // +kubebuilder:example="Hello, this is a transcription."
  string plain_text = 8;

  // Message creation timestamp.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="2026-04-28T09:30:00Z"
  google.protobuf.Timestamp created_at = 9 [(buf.validate.field).required = true];

  // Message last update timestamp.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="2026-04-28T09:35:00Z"
  google.protobuf.Timestamp updated_at = 10 [(buf.validate.field).required = true];
}

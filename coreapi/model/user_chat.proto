syntax = "proto3";

package coreapi.model;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/model";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.model";

// State of a user chat conversation.
enum UserChatState {
  // Unspecified or not set.
  USER_CHAT_STATE_UNSPECIFIED = 0;
  // The chat has been resolved and closed.
  USER_CHAT_STATE_CLOSED = 1;
  // The chat is actively being handled by a manager.
  USER_CHAT_STATE_OPENED = 2;
  // The chat is temporarily paused and will reopen at a scheduled time.
  USER_CHAT_STATE_SNOOZED = 3;
  // The chat is waiting in the assignment queue for an available manager.
  USER_CHAT_STATE_QUEUED = 4;
  // The chat has been created but no message has been sent yet.
  USER_CHAT_STATE_INITIAL = 5;
}

// Reason why an inbound call or chat was missed.
enum MissedReason {
  // Unspecified or not set.
  MISSED_REASON_UNSPECIFIED = 0;
  // The channel was outside of operating hours.
  MISSED_REASON_NOT_IN_OPERATION = 1;
  // The user left before a manager could respond.
  MISSED_REASON_USER_LEFT = 2;
  // The ring time expired without any manager answering.
  MISSED_REASON_RING_TIME_OVER = 3;
  // The inbound request was rate-limited.
  MISSED_REASON_INBOUND_RATE_LIMIT = 4;
  // No operator was available to handle the chat.
  MISSED_REASON_NO_OPERATOR = 5;
  // The assignment queue capacity was exceeded.
  MISSED_REASON_EXCEEDED_QUEUE = 6;
  // The user abandoned the chat while waiting in the queue.
  MISSED_REASON_ABANDONED_IN_QUEUE = 7;
  // The workflow automation determined the chat should be missed.
  MISSED_REASON_WORKFLOW = 8;
  // The assigned manager left the chat without resolving it.
  MISSED_REASON_MANAGER_LEFT = 9;
  // No fallback client was available to receive the call.
  MISSED_REASON_NO_FALLBACK_CLIENT = 10;
  // The phone number is reserved and cannot receive inbound calls.
  MISSED_REASON_PRESERVED_NUMBER = 11;
  // The phone number is not registered in the system.
  MISSED_REASON_UNREGISTERED_NUMBER = 12;
  // The user has been blocked from initiating chats.
  MISSED_REASON_BLOCKED_USER = 13;
}

// Priority level for auto-assignment routing.
enum AutoAssignPriority {
  // Unspecified or not set.
  AUTO_ASSIGN_PRIORITY_UNSPECIFIED = 0;
  // Low priority; assigned after medium and high priority chats.
  AUTO_ASSIGN_PRIORITY_LOW = 1;
  // Default priority level.
  AUTO_ASSIGN_PRIORITY_MEDIUM = 2;
  // High priority; assigned before lower priority chats.
  AUTO_ASSIGN_PRIORITY_HIGH = 3;
}

// Goal achievement state of a user chat.
enum UserChatGoalState {
  // Unspecified or not set.
  USER_CHAT_GOAL_STATE_UNSPECIFIED = 0;
  // The tracked goal event has been achieved.
  USER_CHAT_GOAL_STATE_ACHIEVED = 1;
  // The tracked goal event was not achieved before the chat closed.
  USER_CHAT_GOAL_STATE_NOT_ACHIEVED = 2;
  // The goal event is still being tracked.
  USER_CHAT_GOAL_STATE_WAITING = 3;
  // No goal event is configured for this chat.
  USER_CHAT_GOAL_STATE_NONE = 4;
}

// Type of subtext displayed below the chat title.
enum UserChatSubtextType {
  // Unspecified or not set.
  USER_CHAT_SUBTEXT_TYPE_UNSPECIFIED = 0;
  // Shows the chat description as the subtext.
  USER_CHAT_SUBTEXT_TYPE_DESCRIPTION = 1;
  // Shows the incoming message preview as the subtext.
  USER_CHAT_SUBTEXT_TYPE_INCOMING = 2;
}

// Direction of a user chat relative to the channel.
enum UserChatDirection {
  // Unspecified or not set.
  USER_CHAT_DIRECTION_UNSPECIFIED = 0;
  // Inbound conversation started by a user or external contact.
  USER_CHAT_DIRECTION_INBOUND = 1;
  // Outbound conversation started by a manager or channel-side actor.
  USER_CHAT_DIRECTION_OUTBOUND = 2;
  // Shared conversation created from another chat context.
  USER_CHAT_DIRECTION_SHARING = 3;
}

// Statistics measured for a user chat conversation.
//
// Duration fields are measured in milliseconds.
message UserChatStat {
  // Direction of the conversation relative to the channel.
  UserChatDirection direction = 1;

  // Timestamp when the chat first left the assignment queue.
  //
  // +kubebuilder:example="2024-03-29T03:24:30Z"
  google.protobuf.Timestamp first_queue_out_at = 2;

  // Timestamp when the chat first became active.
  //
  // +kubebuilder:example="2024-03-29T03:24:30Z"
  google.protobuf.Timestamp first_active_at = 3;

  // Timestamp when the chat was first opened.
  //
  // +kubebuilder:example="2024-03-29T03:24:30Z"
  google.protobuf.Timestamp first_opened_at = 4;

  // Timestamp when the chat first entered the assignment queue.
  //
  // +kubebuilder:example="2024-03-29T03:24:30Z"
  google.protobuf.Timestamp first_queue_in_at = 5;

  // Timestamp when the chat was first missed.
  //
  // +kubebuilder:example="2024-03-29T03:24:30Z"
  google.protobuf.Timestamp first_missed_at = 6;

  // Timestamp when the chat was first closed.
  //
  // +kubebuilder:example="2024-03-29T03:28:34Z"
  google.protobuf.Timestamp first_closed_at = 7;

  // ID of the assignee when the chat was first closed.
  //
  // +kubebuilder:example="9187"
  string assignee_id_at_first_close = 8;

  // Number of times the chat was reopened.
  //
  // +kubebuilder:example=1
  int32 reopen_count = 9;

  // ID of the first assignee after the chat first became active.
  //
  // +kubebuilder:example="9187"
  string first_assignee_id_after_active = 10;

  // Timestamp when the chat was first assigned.
  //
  // +kubebuilder:example="2024-03-29T03:25:00Z"
  google.protobuf.Timestamp first_assigned_at = 11;

  // ID of the first assignee.
  //
  // +kubebuilder:example="9187"
  string first_assignee_id = 12;

  // Number of times the chat was reassigned.
  //
  // +kubebuilder:example=2
  int32 reassignment_count = 13;

  // Timestamp when the user first asked a question.
  //
  // +kubebuilder:example="2024-03-29T03:24:30Z"
  google.protobuf.Timestamp first_asked_at = 14;

  // Number of customer satisfaction scores submitted for the chat.
  //
  // +kubebuilder:example=1
  int32 csat_count = 15;

  // Timestamp when the chat first became managed.
  //
  // +kubebuilder:example="2024-03-29T03:24:48Z"
  google.protobuf.Timestamp managed_at = 16;

  // Number of times the chat was snoozed.
  //
  // +kubebuilder:example=1
  int32 snooze_count = 17;

  // Total time the chat spent snoozed.
  //
  // +kubebuilder:example=60000
  int64 total_snoozed_time = 18;

  // Total time the chat spent closed before reopening.
  //
  // +kubebuilder:example=120000
  int64 total_closed_time = 19;

  // Timestamp when the chat was first answered.
  //
  // +kubebuilder:example="2024-03-29T03:28:35Z"
  google.protobuf.Timestamp first_answered_at = 20;

  // Sum of reply durations.
  //
  // +kubebuilder:example=90000
  int64 total_reply_time = 21;

  // Number of replies counted in reply-time statistics.
  //
  // +kubebuilder:example=3
  int32 reply_count = 22;

  // Number of replies counted during operation time.
  //
  // +kubebuilder:example=2
  int32 reply_count_in_operation = 23;

  // Sum of reply durations during operation time.
  //
  // +kubebuilder:example=80000
  int64 total_reply_time_in_operation = 24;

  // Timestamp of the first reply after the chat first became active.
  //
  // +kubebuilder:example="2024-03-29T03:28:35Z"
  google.protobuf.Timestamp first_replied_at_after_active = 25;

  // Total snoozed time during operation time.
  //
  // +kubebuilder:example=55000
  int64 operation_total_snoozed_time = 26;

  // Total closed time during operation time.
  //
  // +kubebuilder:example=110000
  int64 operation_total_closed_time = 27;

  // Duration from management to first assignment.
  //
  // +kubebuilder:example=12000
  int64 time_to_first_assignment = 28;

  // Duration from management to first assignment during operation time.
  //
  // +kubebuilder:example=10000
  int64 time_to_first_assignment_in_operation = 29;

  // Duration from management to first answer.
  //
  // +kubebuilder:example=226139
  int64 time_to_first_answer = 30;

  // Duration from management to first answer during operation time.
  //
  // +kubebuilder:example=55000
  int64 time_to_first_answer_in_operation = 31;

  // Duration from first ask to first answer.
  //
  // +kubebuilder:example=226139
  int64 time_from_first_ask_to_first_answer = 32;

  // Duration from first ask to first answer during operation time.
  //
  // +kubebuilder:example=55000
  int64 time_from_first_ask_to_first_answer_in_operation = 33;

  // Duration from first assignment to first answer.
  //
  // +kubebuilder:example=180000
  int64 time_from_first_assignment_to_first_answer = 34;

  // Duration from first assignment to first answer during operation time.
  //
  // +kubebuilder:example=50000
  int64 time_from_first_assignment_to_first_answer_in_operation = 35;

  // Duration from first active state to first answer.
  //
  // +kubebuilder:example=226139
  int64 time_from_first_active_to_first_answer = 36;

  // Duration from first active state to first answer during operation time.
  //
  // +kubebuilder:example=55000
  int64 time_from_first_active_to_first_answer_in_operation = 37;

  // Duration from first open to first answer.
  //
  // +kubebuilder:example=226139
  int64 time_from_first_open_to_first_answer = 38;

  // Duration from first open to first answer during operation time.
  //
  // +kubebuilder:example=55000
  int64 time_from_first_open_to_first_answer_in_operation = 39;

  // Duration spent in the first queue interval.
  //
  // +kubebuilder:example=30000
  int64 first_queue_time = 40;

  // Duration spent in the first queue interval during operation time.
  //
  // +kubebuilder:example=25000
  int64 first_queue_time_in_operation = 41;

  // Average reply duration.
  //
  // +kubebuilder:example=45000
  int64 avg_reply_time = 42;

  // Average reply duration during operation time.
  //
  // +kubebuilder:example=40000
  int64 avg_reply_time_in_operation = 43;

  // Duration from management to first close.
  //
  // +kubebuilder:example=226139
  int64 time_to_first_close = 44;

  // Duration from management to first close during operation time.
  //
  // +kubebuilder:example=55000
  int64 time_to_first_close_in_operation = 45;

  // Duration from first ask to first close.
  //
  // +kubebuilder:example=226139
  int64 time_from_first_ask_to_first_close = 46;

  // Duration from first ask to first close during operation time.
  //
  // +kubebuilder:example=55000
  int64 time_from_first_ask_to_first_close_in_operation = 47;

  // Duration from first assignment to first close.
  //
  // +kubebuilder:example=180000
  int64 time_from_first_assignment_to_first_close = 48;

  // Duration from first assignment to first close during operation time.
  //
  // +kubebuilder:example=50000
  int64 time_from_first_assignment_to_first_close_in_operation = 49;

  // Duration from first active state to first close.
  //
  // +kubebuilder:example=226139
  int64 time_from_first_active_to_first_close = 50;

  // Duration from first active state to first close during operation time.
  //
  // +kubebuilder:example=55000
  int64 time_from_first_active_to_first_close_in_operation = 51;

  // Duration from first open to first close.
  //
  // +kubebuilder:example=226139
  int64 time_from_first_open_to_first_close = 52;

  // Duration from first open to first close during operation time.
  //
  // +kubebuilder:example=55000
  int64 time_from_first_open_to_first_close_in_operation = 53;

  // Duration from management to close.
  //
  // +kubebuilder:example=226139
  int64 time_to_close = 54;

  // Duration from management to close during operation time.
  //
  // +kubebuilder:example=55000
  int64 time_to_close_in_operation = 55;

  // Duration of the first member handling interval.
  //
  // +kubebuilder:example=180000
  int64 first_member_handling_time = 56;

  // Duration of the first member handling interval during operation time.
  //
  // +kubebuilder:example=50000
  int64 first_member_handling_time_in_operation = 57;

  // Total member handling duration.
  //
  // +kubebuilder:example=360000
  int64 member_handling_time = 58;

  // Total member handling duration during operation time.
  //
  // +kubebuilder:example=100000
  int64 member_handling_time_in_operation = 59;

  // Whether workflow handling was triggered.
  //
  // +kubebuilder:example=true
  bool workflow_triggered = 60;

  // Whether ALF handling was triggered.
  //
  // +kubebuilder:example=true
  bool alf_triggered = 61;

  // Whether the chat was ever opened.
  //
  // +kubebuilder:example=true
  bool ever_opened = 62;

  // Whether the chat was reopened.
  //
  // +kubebuilder:example=true
  bool reopened = 63;

  // Whether the chat was reassigned.
  //
  // +kubebuilder:example=true
  bool reassigned = 64;

  // Whether the chat became managed during operation time.
  //
  // +kubebuilder:example=true
  bool managed_in_operation_time = 65;

  // Timestamp when workflow handling first started.
  //
  // +kubebuilder:example="2024-03-29T03:24:30Z"
  google.protobuf.Timestamp first_workflow_started_at = 66;

  // Timestamp when workflow handling first ended.
  //
  // +kubebuilder:example="2024-03-29T03:25:30Z"

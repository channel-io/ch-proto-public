syntax = "proto3";

package coreapi.model;

import "buf/validate/validate.proto";
import "coreapi/model/manager.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/model";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.model";

// ChatSession represents a per-person view of a chat conversation,
// tracking read state, notification counts, and preferences.
message ChatSession {
  // Composite partition key identifying the person and chat type scope.
  // Format: "{personType}-{personId}-{chatType}".
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:example="manager-m001-userChat"
  string key = 1 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Chat ID of the conversation this session tracks.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:example="uc-abc123"
  string chat_id = 2 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Section ID used to organize team chat conversations into custom groups.
  //
  // +kubebuilder:example="sec-001"
  string team_chat_section_id = 3;

  // Composite key identifying the conversation.
  // Format: "{chatType}-{chatId}".
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:example="userChat-uc-abc123"
  string chat_key = 4 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Opaque sort key for ordering sessions by last activity.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:example="manager-m001-userChat"
  string updated_key = 5 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Opaque sort key for filtering and ordering sessions with unread messages.
  // Empty when the session has no unread messages (i.e. badge is zero).
  //
  // +kubebuilder:example="manager-m001-userChat"
  string unread_key = 6;

  // Channel ID this session belongs to.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="ch-12345"
  string channel_id = 7 [(buf.validate.field).required = true];

  // Number of unread messages with alert-level notification priority.
  // Defaults to 0.
  //
  // +kubebuilder:example="0"
  int32 alert = 8;

  // Total number of unread messages in this session.
  // Defaults to 0.
  //
  // +kubebuilder:example="3"
  int32 unread = 9;

  // Notification preference controlling which messages trigger alerts in this session.
  //
  // +kubebuilder:example="all"
  SessionWatch watch = 10;

  // Whether @all mentions trigger alert-level notifications in this session.
  // When absent, inherits from the manager-level default setting.
  //
  // +kubebuilder:example="true"
  bool all_mention_important = 11;

  // Timestamp when the person last read messages in this session.
  //
  // +kubebuilder:example="2026-04-28T09:40:00Z"
  google.protobuf.Timestamp read_at = 12;

  // Timestamp when the last message was received in this conversation.
  //
  // +kubebuilder:example="2026-04-28T09:30:00Z"
  google.protobuf.Timestamp received_at = 13;

  // Timestamp when the last message was posted in this conversation.
  //
  // +kubebuilder:example="2026-04-28T09:30:00Z"
  google.protobuf.Timestamp posted_at = 14;

  // Session last update timestamp.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="2026-04-28T09:35:00Z"
  google.protobuf.Timestamp updated_at = 15 [(buf.validate.field).required = true];

  // Session creation timestamp.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="2026-04-28T09:30:00Z"
  google.protobuf.Timestamp created_at = 16 [(buf.validate.field).required = true];

  // Optimistic locking version.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="1"
  int64 version = 17 [(buf.validate.field).required = true];

  // Unique session identifier.
  // Format: "{key}-{chatId}".
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="manager-m001-userChat-uc-abc123"
  string id = 18 [(buf.validate.field).required = true];

  // Chat type of the conversation (e.g., "userChat", "group", "directChat").
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:example="userChat"
  string chat_type = 19 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Entity type of the session owner (e.g., "manager", "user").
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:example="manager"
  string person_type = 20 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Entity ID of the session owner.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:example="m-001"
  string person_id = 21 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];
}

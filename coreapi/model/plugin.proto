syntax = "proto3";

package coreapi.model;

import "buf/validate/validate.proto";
import "coreapi/model/image_file.proto";
import "coreapi/model/tiny_file.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/model";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.model";

// Plugin state in the activation lifecycle.
enum PluginState {
  PLUGIN_STATE_UNSPECIFIED = 0;
  PLUGIN_STATE_WAITING = 1;
  PLUGIN_STATE_ACTIVE = 2;
}

// Visual appearance mode for the plugin widget.
enum PluginAppearance {
  PLUGIN_APPEARANCE_UNSPECIFIED = 0;
  PLUGIN_APPEARANCE_LIGHT = 1;
  PLUGIN_APPEARANCE_DARK = 2;
  PLUGIN_APPEARANCE_SYSTEM = 3;
}

// Button rendering type for the plugin launcher.
enum PluginButtonType {
  PLUGIN_BUTTON_TYPE_UNSPECIFIED = 0;
  PLUGIN_BUTTON_TYPE_LEGACY = 1;
  PLUGIN_BUTTON_TYPE_CUSTOM_IMAGE = 2;
  PLUGIN_BUTTON_TYPE_ICON_BUTTON = 3;
}

// Predefined icon for the plugin launcher button.
enum PluginIconButton {
  PLUGIN_ICON_BUTTON_UNSPECIFIED = 0;
  PLUGIN_ICON_BUTTON_CHANNEL = 1;
  PLUGIN_ICON_BUTTON_CHANNEL_FILLED = 2;
  PLUGIN_ICON_BUTTON_CHAT_BUBBLE_ALT = 3;
  PLUGIN_ICON_BUTTON_CHAT_BUBBLE_ALT_FILLED = 4;
  PLUGIN_ICON_BUTTON_CHAT_BUBBLE_FILLED = 5;
  PLUGIN_ICON_BUTTON_CHAT_LIGHTNING_FILLED = 6;
  PLUGIN_ICON_BUTTON_CHAT_PROGRESS = 7;
  PLUGIN_ICON_BUTTON_CHAT_PROGRESS_FILLED = 8;
  PLUGIN_ICON_BUTTON_CHAT_QUESTION = 9;
  PLUGIN_ICON_BUTTON_CHAT_QUESTION_FILLED = 10;
  PLUGIN_ICON_BUTTON_COMMENT = 11;
  PLUGIN_ICON_BUTTON_COMMENT_FILLED = 12;
  PLUGIN_ICON_BUTTON_COMMUNICATION = 13;
  PLUGIN_ICON_BUTTON_HEADSET = 14;
  PLUGIN_ICON_BUTTON_HELP_FILLED = 15;
  PLUGIN_ICON_BUTTON_SEND_FORWARD = 16;
  PLUGIN_ICON_BUTTON_SEND_FORWARD_FILLED = 17;
  PLUGIN_ICON_BUTTON_SMS = 18;
  PLUGIN_ICON_BUTTON_SMS_FILLED = 19;
}

// Horizontal position of the plugin widget on screen.
enum PluginPosition {
  PLUGIN_POSITION_UNSPECIFIED = 0;
  PLUGIN_POSITION_LEFT = 1;
  PLUGIN_POSITION_RIGHT = 2;
}

// Vertical position of the mobile chat bubble.
enum PluginBubblePosition {
  PLUGIN_BUBBLE_POSITION_UNSPECIFIED = 0;
  PLUGIN_BUBBLE_POSITION_TOP = 1;
  PLUGIN_BUBBLE_POSITION_BOTTOM = 2;
}

// Plugin represents the channel plugin (chat widget) configuration.
message Plugin {
  // Unique plugin identifier.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="plg-001"
  string id = 1 [(buf.validate.field).required = true];

  // Plugin API key in UUID format.
  //
  string key = 2;

  // Channel ID this plugin belongs to.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="ch-12345"
  string channel_id = 3 [(buf.validate.field).required = true];

  // Current activation lifecycle state.
  //
  // +kubebuilder:validation:Required
  PluginState state = 4 [(buf.validate.field).required = true];

  // Widget display name shown to end users.
  // Defaults to the channel name on creation.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:validation:MaxLength=30
  // +kubebuilder:example="Support Widget"
  string name = 5 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).cel = {
      id: "string.maxLen"
      message: "value must be no more than 30 characters"
      expression: "size(this) <= 30"
    },
    (buf.validate.field).required = true
  ];

  // Plugin creation timestamp.
  //
  // +kubebuilder:validation:Required
  google.protobuf.Timestamp created_at = 6 [(buf.validate.field).required = true];

  // Color theme of the widget.
  // Defaults to LIGHT.
  //
  // +kubebuilder:validation:Required
  PluginAppearance appearance = 7 [(buf.validate.field).required = true];

  // Whether the text label is displayed alongside the launcher button.
  // Defaults to true.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="true"
  bool label_button = 8 [(buf.validate.field).required = true];

  // Text shown on the label next to the launcher button.
  // Applicable when label_button is true.
  //
  // +kubebuilder:validation:MinLength=4
  // +kubebuilder:validation:MaxLength=30
  string label_button_text = 9 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 4 characters"
      expression: "size(this) >= 4"
    },
    (buf.validate.field).cel = {
      id: "string.maxLen"
      message: "value must be no more than 30 characters"
      expression: "size(this) <= 30"
    }
  ];

  // Localized label button text, keyed by locale code (e.g., "en", "ko").
  // Overrides label_button_text for matching locales.
  //
  map<string, string> label_button_text_i18n_map = 10;

  // Determines how the launcher button is rendered.
  // Defaults to ICON_BUTTON. When set to CUSTOM_IMAGE, the custom_image field must be provided.
  //
  // +kubebuilder:validation:Required
  PluginButtonType button_type = 11 [(buf.validate.field).required = true];

  // Predefined icon used for the launcher button.
  // Applicable when button_type is ICON_BUTTON. Defaults to CHANNEL_FILLED.
  //
  // +kubebuilder:validation:Required
  PluginIconButton icon_button = 12 [(buf.validate.field).required = true];

  // Uploaded image for the launcher button.
  // Applicable when button_type is CUSTOM_IMAGE.
  //
  coreapi.model.ImageFile custom_image = 13;

  // Uploaded desktop launcher image.
  // Applicable when button_type is LEGACY.
  //
  coreapi.model.TinyFile desk_image = 14;

  // Horizontal offset of the desktop widget from its anchored edge, in pixels.
  //
  // +kubebuilder:example="20"
  int32 desk_margin_x = 15;

  // Vertical offset of the desktop widget from the bottom edge, in pixels.
  //
  int32 desk_margin_y = 16;

  // Whether the desktop launcher button is hidden while the widget remains accessible.
  //
  bool desk_hide_button = 17;

  // Horizontal anchor position of the desktop widget.
  //
  PluginPosition desk_position = 18;

  // Uploaded mobile launcher image.
  // Applicable when button_type is LEGACY.
  //
  coreapi.model.TinyFile mobile_image = 19;

  // Horizontal offset of the mobile widget from its anchored edge, in pixels.
  //
  // +kubebuilder:example="16"
  int32 mobile_margin_x = 20;

  // Vertical offset of the mobile widget from the bottom edge, in pixels.
  //
  int32 mobile_margin_y = 21;

  // Horizontal anchor position of the mobile widget.
  //
  PluginPosition mobile_position = 22;

  // Whether the mobile launcher button is hidden while the widget remains accessible.
  //
  // +kubebuilder:example="false"
  bool mobile_hide_button = 23;

  // Vertical position of the chat bubble on mobile devices.
  //
  PluginBubblePosition mobile_bubble_position = 24;

  // URL patterns that restrict where the plugin is displayed.
  // When empty, the plugin is displayed on all pages. Protocol prefixes are stripped before matching.
  //
  // +kubebuilder:validation:MaxItems=5
  repeated string url_whitelist = 25 [(buf.validate.field).repeated = {max_items: 5}];

  // Probability of showing the plugin to a given visitor, where 0.0 means never shown and 1.0 means always shown.
  //
  // +kubebuilder:validation:Minimum=0
  // +kubebuilder:validation:Maximum=1
  // +kubebuilder:example="1.0"
  float run_rate = 26 [
    (buf.validate.field).cel = {
      id: "float.gte"
      message: "value must be greater than or equal to 0"
      expression: "this >= 0.0"
    },
    (buf.validate.field).cel = {
      id: "float.lte"
      message: "value must be less than or equal to 1"
      expression: "this <= 1.0"
    }
  ];

  // Facebook Pixel ID linked for conversion tracking.
  //
  // +kubebuilder:example="123456789012345"
  string facebook_pixel_id = 27;

  // Resolved URL of the custom launcher button image.
  // Automatically derived from custom_image.
  //
  string custom_image_url = 28;

  // Resolved URL of the desktop launcher image.
  // Automatically derived from desk_image.
  //
  // +kubebuilder:example="https://cdn.channel.io/plugin/desk.png"
  string desk_image_url = 29;

  // Resolved URL of the mobile launcher image.
  // Automatically derived from mobile_image.
  //
  string mobile_image_url = 30;
}

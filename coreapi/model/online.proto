syntax = "proto3";

package coreapi.model;

import "buf/validate/validate.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/model";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.model";

// Online represents the online presence of a person in a channel.
message Online {
  // Channel ID this online record belongs to.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="7683"
  string channel_id = 1 [(buf.validate.field).required = true];

  // Type of the person (e.g., manager, user).
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:example="manager"
  string person_type = 2 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Identifier of the person.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:example="12372"
  string person_id = 3 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Composite presence record identifier derived from person type and person ID.
  //
  // +kubebuilder:example="manager-12372"
  string id = 4;
}

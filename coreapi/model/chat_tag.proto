syntax = "proto3";

package coreapi.model;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/model";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.model";

// Color variant for visual labeling of chat tags.
enum ChatTagColorVariant {
  CHAT_TAG_COLOR_VARIANT_UNSPECIFIED = 0;
  CHAT_TAG_COLOR_VARIANT_RED = 1;
  CHAT_TAG_COLOR_VARIANT_ORANGE = 2;
  CHAT_TAG_COLOR_VARIANT_YELLOW = 3;
  CHAT_TAG_COLOR_VARIANT_OLIVE = 4;
  CHAT_TAG_COLOR_VARIANT_GREEN = 5;
  CHAT_TAG_COLOR_VARIANT_COBALT = 6;
  CHAT_TAG_COLOR_VARIANT_PURPLE = 7;
  CHAT_TAG_COLOR_VARIANT_PINK = 8;
  CHAT_TAG_COLOR_VARIANT_NAVY = 9;
}

// ChatTag represents a classification label that can be attached to user chats
// for categorization and filtering.
message ChatTag {
  // Unique chat tag identifier.
  //
  // +kubebuilder:validation:Nullable
  string id = 1;

  // Channel ID this chat tag belongs to.
  //
  // +kubebuilder:validation:Nullable
  string channel_id = 2;

  // Color used for visual display of this tag in the Desk UI.
  //
  // +kubebuilder:validation:Nullable
  ChatTagColorVariant color_variant = 3;

  // Human-readable display name of the chat tag.
  // Cannot be changed after creation.
  //
  // +kubebuilder:validation:Required
  string name = 4 [(buf.validate.field).required = true];

  // Lowercase key automatically derived from the tag name.
  // Unique within the channel (case-insensitive).
  // Cannot be changed after creation.
  //
  // +kubebuilder:validation:Required
  string key = 5 [(buf.validate.field).required = true];

  // Free-text description explaining when or how to use this tag.
  //
  // +kubebuilder:validation:Nullable
  // +kubebuilder:validation:MaxLength=128
  string description = 6 [(buf.validate.field).cel = {
    id: "string.maxLen"
    message: "value must be no more than 128 characters"
    expression: "size(this) <= 128"
  }];

  // Chat tag creation timestamp.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Timestamp created_at = 7;
}

syntax = "proto3";

package coreapi.model;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/model";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.model";

// Visibility scope of a group.
enum GroupScope {
  GROUP_SCOPE_UNSPECIFIED = 0;
  // Visible to all managers in the channel regardless of membership.
  GROUP_SCOPE_ALL = 1;
  // Listed publicly; any manager can join.
  GROUP_SCOPE_PUBLIC = 2;
  // Hidden from non-members; only invited managers can access.
  GROUP_SCOPE_PRIVATE = 3;
}

// Group represents a team chat room for internal manager communication.
message Group {
  // Unique group identifier.
  //
  // +kubebuilder:validation:Nullable
  string id = 1;

  // Channel ID this group belongs to.
  //
  // +kubebuilder:validation:Nullable
  string channel_id = 2;

  // Display title of the group.
  // Unique within the channel (case-insensitive).
  // Allowed characters: letters, numbers, hyphens, underscores,
  // and parentheses.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=2
  // +kubebuilder:validation:MaxLength=30
  // +kubebuilder:validation:Pattern="[\\p{L}\\p{N}\\-_()]+"
  string title = 3 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 2 characters"
      expression: "size(this) >= 2"
    },
    (buf.validate.field).cel = {
      id: "string.maxLen"
      message: "value must be no more than 30 characters"
      expression: "size(this) <= 30"
    },
    (buf.validate.field).string.pattern = "[\\p{L}\\p{N}\\-_()]+",
    (buf.validate.field).required = true
  ];

  // Visibility scope determining who can discover and access the group.
  //
  // +kubebuilder:validation:Required
  GroupScope scope = 4 [(buf.validate.field).required = true];

  // IDs of managers who are members of this group.
  //
  // +kubebuilder:validation:Nullable
  // +kubebuilder:validation:MinItems=1
  repeated string manager_ids = 5;

  // Icon identifier or emoji representing the group visually.
  // Must not contain whitespace.
  //
  // +kubebuilder:validation:Nullable
  // +kubebuilder:validation:Pattern="\\S+"
  string icon = 6 [(buf.validate.field).string.pattern = "\\S+"];

  // ID of the active live meet session in this group.
  //
  // +kubebuilder:validation:Nullable
  string live_meet_id = 7;

  // Free-text description explaining the group's purpose or topic.
  //
  // +kubebuilder:validation:Nullable
  // +kubebuilder:validation:MaxLength=200
  string description = 8 [(buf.validate.field).cel = {
    id: "string.maxLen"
    message: "value must be no more than 200 characters"
    expression: "size(this) <= 200"
  }];

  // Group creation timestamp.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Timestamp created_at = 9;

  // Group last update timestamp.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Timestamp updated_at = 10;
}

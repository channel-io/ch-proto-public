syntax = "proto3";

package coreapi.model;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/model";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.model";

// +kubebuilder:example="sent"
// Filter state for querying one-time message user delivery results.
enum OneTimeMsgUserState {
  ONE_TIME_MSG_USER_STATE_UNSPECIFIED = 0;
  ONE_TIME_MSG_USER_STATE_SENT = 1;
  ONE_TIME_MSG_USER_STATE_VIEW = 2;
  ONE_TIME_MSG_USER_STATE_GOAL = 3;
  ONE_TIME_MSG_USER_STATE_CLICK = 4;
}

// OneTimeMsgUser represents a per-user delivery and engagement record for a one-time message.
message OneTimeMsgUser {
  // One-time message that was delivered to this user.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:example="otm-001"
  string one_time_msg_id = 1 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Target user identifier.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:example="u-abc123"
  string user_id = 2 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Timestamp when the message was delivered to the user.
  //
  // +kubebuilder:example="2026-04-28T09:30:00Z"
  google.protobuf.Timestamp sent = 3;

  // Timestamp when the user first viewed the delivered message.
  //
  // +kubebuilder:example="2026-04-28T09:30:00Z"
  google.protobuf.Timestamp view = 4;

  // Timestamp when the user completed the goal event.
  //
  // +kubebuilder:example="2026-04-28T09:30:00Z"
  google.protobuf.Timestamp goal = 5;

  // Timestamp when the user first clicked a link in the message.
  //
  // +kubebuilder:example="2026-04-28T09:30:00Z"
  google.protobuf.Timestamp click = 6;

  // Cumulative revenue attributed to this user from the one-time message.
  //
  // +kubebuilder:example="50.25"
  string revenue = 7;

  // Composite identifier in the format "{one_time_msg_id}-{user_id}".
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="otm-001-u-abc123"
  string id = 8 [(buf.validate.field).required = true];
}

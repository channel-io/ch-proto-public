syntax = "proto3";

package coreapi.model;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/model";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.model";

// Filter state for querying campaign user delivery results.
enum CampaignUserState {
  CAMPAIGN_USER_STATE_UNSPECIFIED = 0;
  CAMPAIGN_USER_STATE_SENT = 1;
  CAMPAIGN_USER_STATE_VIEW = 2;
  CAMPAIGN_USER_STATE_GOAL = 3;
  CAMPAIGN_USER_STATE_CLICK = 4;
}

// CampaignUser represents a per-user delivery and engagement record for a campaign.
message CampaignUser {
  // Target user identifier.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:example="u-abc123"
  string user_id = 1 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Campaign that delivered the message.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:example="cpn-001"
  string campaign_id = 2 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Message variant that was delivered to this user.
  //
  // +kubebuilder:example="cm-001"
  string msg_id = 3;

  // User chat conversation created by the campaign delivery.
  //
  // +kubebuilder:example="uc-abc123"
  string user_chat_id = 4;

  // Timestamp when the campaign message was delivered to the user.
  //
  // +kubebuilder:example="2026-04-28T09:30:00Z"
  google.protobuf.Timestamp sent = 5;

  // Timestamp when the user first viewed the delivered message.
  //
  // +kubebuilder:example="2026-04-28T09:30:00Z"
  google.protobuf.Timestamp view = 6;

  // Timestamp when the user first clicked a link in the message.
  //
  // +kubebuilder:example="2026-04-28T09:30:00Z"
  google.protobuf.Timestamp click = 7;

  // Timestamp when the user completed the campaign goal event.
  //
  // +kubebuilder:example="2026-04-28T09:30:00Z"
  google.protobuf.Timestamp goal = 8;

  // Cumulative revenue attributed to this user from the campaign.
  //
  // +kubebuilder:example="100.50"
  string revenue = 9;

  // Composite identifier in the format "{campaign_id}-{user_id}".
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="cpn-001-u-abc123"
  string id = 10 [(buf.validate.field).required = true];
}

syntax = "proto3";

package coreapi.model;

import "buf/validate/validate.proto";
import "coreapi/model/campaign.proto";
import "coreapi/model/name_desc.proto";
import "coreapi/model/tiny_file.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/model";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.model";

// Preset duration after which a manager's status automatically clears.
enum StatusClearAfter {
  STATUS_CLEAR_AFTER_UNSPECIFIED = 0;
  STATUS_CLEAR_AFTER_NONE = 1;
  STATUS_CLEAR_AFTER_HALF_HOUR = 2;
  STATUS_CLEAR_AFTER_ONE_HOUR = 3;
  STATUS_CLEAR_AFTER_TWO_HOURS = 4;
  STATUS_CLEAR_AFTER_TODAY = 5;
  STATUS_CLEAR_AFTER_THIS_WEEK = 6;
  STATUS_CLEAR_AFTER_CUSTOM = 7;
}

// Manager represents an operator or administrator in a channel.
message Manager {
  // Unique manager identifier.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string id = 1 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Channel ID this manager belongs to.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string channel_id = 2 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Account ID linked to this manager.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string account_id = 3 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Manager display name.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:validation:MaxLength=30
  // +kubebuilder:validation:Pattern="^[^@#$%:/\\]+$"
  string name = 4 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).cel = {
      id: "string.maxLen"
      message: "value must be no more than 30 characters"
      expression: "size(this) <= 30"
    },
    (buf.validate.field).string.pattern = "^[^@#$%:/\\\\]+$",
    (buf.validate.field).required = true
  ];

  // Manager description.
  //
  // +kubebuilder:validation:Nullable
  // +kubebuilder:validation:MaxLength=180
  string description = 5 [(buf.validate.field).cel = {
    id: "string.maxLen"
    message: "value must be no more than 180 characters"
    expression: "size(this) <= 180"
  }];

  // Whether to display the description to front (end-user) visitors.
  //
  // +kubebuilder:validation:Nullable
  bool show_description_to_front = 6;

  // Internationalized name and description map.
  // Keyed by locale.
  //
  // +kubebuilder:validation:Nullable
  map<string, coreapi.model.NameDesc> name_desc_i18n_map = 7;

  // Manager avatar image URL.
  //
  // +kubebuilder:validation:Nullable
  string avatar_url = 8;

  // Whether this manager is displayed as the channel identity.
  //
  // +kubebuilder:validation:Nullable
  bool display_as_channel = 9;

  // Maximum number of user chats that can be auto-assigned.
  //
  // +kubebuilder:validation:Nullable
  // +kubebuilder:validation:Minimum=0
  // +kubebuilder:validation:Maximum=200
  int32 auto_assign_capacity = 11 [(buf.validate.field).cel = {
    id: "int32.between"
    message: "auto_assign_capacity must be between 0 and 200"
    expression: "this >= 0 && this <= 200"
  }];

  // Status emoji displayed alongside the manager name.
  //
  // +kubebuilder:validation:Nullable
  string status_emoji = 12;

  // Status text displayed alongside the manager name.
  //
  // +kubebuilder:validation:Nullable
  // +kubebuilder:validation:MaxLength=128
  string status_text = 13 [(buf.validate.field).cel = {
    id: "string.maxLen"
    message: "value must be no more than 128 characters"
    expression: "size(this) <= 128"
  }];

  // Timestamp when the status automatically clears.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Timestamp status_clear_at = 14;

  // Whether do-not-disturb mode is active for this manager.
  //
  // +kubebuilder:validation:Nullable
  bool do_not_disturb = 15;

  // Timestamp when do-not-disturb mode automatically clears.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Timestamp do_not_disturb_clear_at = 16;

  // Whether this manager has been soft-deleted.
  //
  // +kubebuilder:validation:Nullable
  bool removed = 27;

  // Manager creation timestamp.
  //
  // +kubebuilder:validation:Required
  google.protobuf.Timestamp created_at = 28 [(buf.validate.field).required = true];

  // Custom key-value profile data.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Struct profile = 31;

  // Manager email address.
  //
  // +kubebuilder:validation:Nullable
  string email = 32;

  // Whether to display the email to end users.
  //
  // +kubebuilder:validation:Nullable
  bool show_email_to_front = 33;

  // Manager mobile phone number.
  //
  // +kubebuilder:validation:Nullable
  string mobile_number = 34;

  // Whether to display the mobile number to end users.
  //
  // +kubebuilder:validation:Nullable
  bool show_mobile_number_to_front = 35;

  // Default notification level for group chats.
  //
  // +kubebuilder:validation:Nullable
  string default_group_watch = 36;

  // Default notification level for direct chats.
  //
  // +kubebuilder:validation:Nullable
  string default_direct_chat_watch = 37;

  // Default notification level for user chats.
  //
  // +kubebuilder:validation:Nullable
  string default_user_chat_watch = 38;

  // Chat notification alert sound.
  //
  // +kubebuilder:validation:Nullable
  string chat_alert_sound = 39;

  // Whether to show private message previews in notifications.
  //
  // +kubebuilder:validation:Nullable
  bool show_private_message_preview = 40;

  // Operator performance score.
  //
  // +kubebuilder:validation:Nullable
  float operator_score = 41;

  // User engagement score.
  //
  // +kubebuilder:validation:Nullable
  float touch_score = 42;

  // Manager avatar image reference.
  //
  // +kubebuilder:validation:Nullable
  coreapi.model.TinyFile avatar = 43;

  // Whether email reminders are enabled for this operator.
  //
  // +kubebuilder:validation:Nullable
  bool operator_email_reminder = 44;

  // Whether this manager is an active operator.
  //
  // +kubebuilder:validation:Nullable
  bool operator = 45;

  // Whether @all mentions are marked as important.
  //
  // +kubebuilder:validation:Nullable
  bool default_all_mention_important = 46;

  // Whether user messages are marked as important.
  //
  // +kubebuilder:validation:Nullable
  bool user_message_important = 47;

  // Manager reference identifier.
  //
  // +kubebuilder:validation:Nullable
  string manager_id = 48;

  // Email address displayed to end users.
  //
  // +kubebuilder:validation:Nullable
  string email_for_front = 49;

  // Mobile number displayed to end users.
  //
  // +kubebuilder:validation:Nullable
  string mobile_number_for_front = 50;

  // Manager role.
  //
  // +kubebuilder:validation:Nullable
  string role = 51;

  // Whether operator scheduling is enabled.
  //
  // +kubebuilder:validation:Nullable
  bool operator_scheduling = 52;

  // Scheduled operating time ranges for this operator.
  //
  // +kubebuilder:validation:Nullable
  repeated coreapi.model.TimeRange operator_time_ranges = 53;
}

syntax = "proto3";

package coreapi.model;

import "buf/validate/validate.proto";
import "coreapi/model/medium_type.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/model";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.model";

// CampaignMsg represents a message variant within a campaign.
// Each campaign can have multiple message variants for A/B testing.
message CampaignMsg {
  // Unique campaign message identifier.
  // Client-assigned on creation.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="cm-001"
  string id = 1 [(buf.validate.field).required = true];

  // Campaign ID this message variant belongs to.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:example="cpn-001"
  string campaign_id = 2 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Channel ID this campaign message belongs to.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="ch-12345"
  string channel_id = 3 [(buf.validate.field).required = true];

  // Human-readable label for this message variant.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:example="Welcome Message"
  string name = 4 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Channel through which this message is delivered.
  // Cannot be changed after creation.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="appAlert"
  MediumType medium_type = 5 [(buf.validate.field).required = true];

  // Specific medium instance within the medium_type (e.g., a particular phone number or email sender).
  //
  // +kubebuilder:example="sms-001"
  string medium_id = 6;

  // Message content and medium-specific delivery configuration.
  // Structure varies by medium_type.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example={"exposureType":"fullScreen","botName":"Support Bot"}
  google.protobuf.Struct settings = 7 [(buf.validate.field).required = true];

  // Campaign message creation timestamp.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="2026-04-28T09:30:00Z"
  google.protobuf.Timestamp created_at = 8 [(buf.validate.field).required = true];

  // Campaign message last update timestamp.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="2026-04-28T09:35:00Z"
  google.protobuf.Timestamp updated_at = 9 [(buf.validate.field).required = true];

  // Cumulative count of messages delivered for this variant.
  //
  // +kubebuilder:example="100"
  int32 sent = 10;

  // Cumulative count of message views by recipients for this variant.
  //
  // +kubebuilder:example="50"
  int32 view = 11;

  // Cumulative count of goal event completions attributed to this variant.
  //
  // +kubebuilder:example="10"
  int32 goal = 12;

  // Cumulative count of message link clicks for this variant.
  //
  // +kubebuilder:example="25"
  int32 click = 13;
}

syntax = "proto3";

package coreapi.model;

import "buf/validate/validate.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/model";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.model";

// ChatBookmark represents a participant's reading position in a chat.
// Tracks the last-read location per person within a specific chat context.
message ChatBookmark {
  // Unique bookmark identifier.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string key = 1 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Chat ID this bookmark belongs to.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string chat_id = 2 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Composite key for the associated chat.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string chat_key = 3 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Opaque key representing the reading position in the chat.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string bookmark_key = 4 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Channel ID this bookmark belongs to.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string channel_id = 5 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Entity version number for optimistic concurrency control.
  int32 version = 6;

  // Type of the bookmark owner (e.g. "manager").
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string person_type = 7 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Identifier of the bookmark owner.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string person_id = 8 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Chat type this bookmark belongs to (e.g. "group", "userChat").
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string chat_type = 9 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];
}

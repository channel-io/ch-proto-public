syntax = "proto3";

package coreapi.model;

import "buf/validate/validate.proto";
import "coreapi/model/entity_type.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/model";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.model";

// ChatBookmark represents a participant's reading position in a chat.
// Tracks the last-read location per person within a specific chat context.
message ChatBookmark {
  reserved 6;
  reserved "version";

  // Unique bookmark identifier.
  // Format: "{personType}-{personId}-{chatType}".
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:example="manager-9187-userChat"
  string key = 1 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Chat ID this bookmark belongs to.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:example="6606508eaa71575f1e8c"
  string chat_id = 2 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Composite key for the associated chat.
  // Format: "{chatType}-{chatId}".
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:example="userChat-6606508eaa71575f1e8c"
  string chat_key = 3 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Opaque key representing the reading position in the chat.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:example="634e3501993b9da89682"
  string bookmark_key = 4 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Channel ID this bookmark belongs to.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="6263"
  string channel_id = 5 [(buf.validate.field).required = true];

  // Type of the bookmark owner.
  //
  // +kubebuilder:validation:Required
  coreapi.model.PersonType person_type = 7 [(buf.validate.field).required = true];

  // Identifier of the bookmark owner.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:example="9187"
  string person_id = 8 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Chat type this bookmark belongs to.
  //
  // +kubebuilder:validation:Required
  coreapi.model.ChatType chat_type = 9 [(buf.validate.field).required = true];
}

syntax = "proto3";

package coreapi.model;

import "buf/validate/validate.proto";
import "coreapi/model/name_desc.proto";
import "coreapi/model/tiny_file.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/model";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.model";

// Bot represents a chatbot entity in a channel.
// AI bots (ALF) are excluded from public API operations.
message Bot {
  // Unique bot identifier.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="223337"
  string id = 1 [(buf.validate.field).required = true];

  // Channel ID this bot belongs to.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="6263"
  string channel_id = 2 [(buf.validate.field).required = true];

  // Bot display name.
  // Unique within the channel.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:validation:MaxLength=30
  // +kubebuilder:validation:Pattern="^[^@#$%:/\\]+$"
  // +kubebuilder:example="Tutorial-bot"
  string name = 3 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).cel = {
      id: "string.maxLen"
      message: "value must be no more than 30 characters"
      expression: "size(this) <= 30"
    },
    (buf.validate.field).string.pattern = "^[^@#$%:/\\\\]+$",
    (buf.validate.field).required = true
  ];

  // Bot description.
  //
  // +kubebuilder:validation:MaxLength=180
  // +kubebuilder:example="Guides new users through the onboarding flow."
  string description = 4 [(buf.validate.field).cel = {
    id: "string.maxLen"
    message: "value must be no more than 180 characters"
    expression: "size(this) <= 180"
  }];

  // Internationalized name and description map.
  // Keyed by locale.
  //
  // +kubebuilder:example={"ko":{"name":"튜토리얼봇","description":"신규 사용자 온보딩 안내"},"ja":{"name":"チュートリアルボット","description":"新規ユーザーのオンボーディング案内"}}
  map<string, coreapi.model.NameDesc> name_desc_i18n_map = 5;

  // Bot color in hex format.
  // Randomly assigned if not specified on creation.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="#d8e082"
  string color = 6 [(buf.validate.field).required = true];

  // Bot avatar image URL.
  //
  // +kubebuilder:example="https://cdn.channel.io/assets/channel-bot.png"
  string avatar_url = 7;

  // Bot creation timestamp.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:example="2024-03-28T08:57:32Z"
  google.protobuf.Timestamp created_at = 8 [(buf.validate.field).required = true];

  // Uploaded bot avatar image.
  //
  coreapi.model.TinyFile avatar = 9;
}

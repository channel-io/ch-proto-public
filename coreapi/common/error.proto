syntax = "proto3";

package coreapi.common;

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/common";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.common";

// +kubebuilder:example="entityNotFound"
// Error codes shared across all Core API operations.
//
// Every error response carries exactly one of:
// - a CommonErrorCode (for errors common to most operations), or
// - an operation_error_code string (for errors specific to a single operation).
enum CommonErrorCode {
  COMMON_ERROR_CODE_UNSPECIFIED = 0;

  // The requested entity does not exist.
  COMMON_ERROR_CODE_ENTITY_NOT_FOUND = 1;

  // Request validation failed.
  // One or more fields did not satisfy the declared constraints.
  // This includes proto field validation (buf.validate) failures AND
  // runtime value validation (e.g., invalid enum values, malformed color codes).
  // Inspect the details field for per-field information.
  COMMON_ERROR_CODE_VALIDATION_FAILED = 2;

  // The pagination cursor is malformed.
  COMMON_ERROR_CODE_INVALID_CURSOR = 3;

  // An unexpected internal error occurred.
  COMMON_ERROR_CODE_INTERNAL_ERROR = 4;

  // Authentication failed.
  // The provided credentials (e.g., API key) are invalid or missing.
  COMMON_ERROR_CODE_UNAUTHORIZED = 5;

  // Access denied.
  // The authenticated principal does not have permission to perform this action.
  COMMON_ERROR_CODE_FORBIDDEN = 6;

  // Rate limit exceeded.
  // Too many requests have been sent in a given time period.
  // Check the Retry-After response header for when to retry.
  COMMON_ERROR_CODE_RATE_LIMIT_EXCEEDED = 7;
}

// Standardized error response for all Core API operations.
//
// Exactly one of common_error_code or operation_error_code is set:
// - common_error_code is set for errors that can occur in any operation.
// - operation_error_code is set for errors specific to a particular operation.
//   Valid values are documented in each service proto's request message comments.
message ErrorResponse {
  // +kubebuilder:example="404"
  int32 status = 1;

  // Set when the error falls into a cross-cutting category.
  // +kubebuilder:example="entityNotFound"
  CommonErrorCode common_error_code = 2;

  // Set when the error is unique to a particular operation.
  // Defined as a string to allow each service to declare its own codes
  // without a global enum.
  // +kubebuilder:example="RESOURCE_NOT_FOUND"
  string operation_error_code = 3;

  // +kubebuilder:example="The requested resource does not exist"
  string message = 4;

  // For validation errors, one entry per violated field.
  // For not-found errors, one entry identifying the missing entity.
  // +kubebuilder:example=[]
  repeated ErrorDetail details = 5;
}

// Detailed information about a single error cause.
message ErrorDetail {
  // e.g., "Bot", "Channel", "Webhook"
  // +kubebuilder:example="Channel"
  string model = 1;

  // e.g., "name", "scopes[0]"
  // +kubebuilder:example="default_domain"
  string field = 2;

  // +kubebuilder:example="invalid-domain!"
  string value = 3;

  // +kubebuilder:example="must match pattern ^[a-z0-9-]+$"
  string message = 4;

  // Set only for proto validation (buf.validate) errors.
  // e.g., "coreapi.service.UpsertBotRequest"
  // +kubebuilder:example="coreapi.model.Channel"
  string proto_package_path = 5;

  // Set only for proto validation (buf.validate) errors.
  // e.g., "string.minLen"
  // +kubebuilder:example="string.pattern"
  string proto_constraint = 6;

  // Index within a repeated field, if applicable.
  // +kubebuilder:example="0"
  optional int32 index = 7;
}

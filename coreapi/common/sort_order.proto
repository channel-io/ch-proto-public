syntax = "proto3";

package coreapi.common;

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/common";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.common";

// Sort direction for ordering query results.
enum SortOrder {
  // Unspecified or not set.
  SORT_ORDER_UNSPECIFIED = 0;
  // Ascending order.
  SORT_ORDER_ASC = 1;
  // Descending order.
  SORT_ORDER_DESC = 2;
  // Both ascending and descending order. TODO: confirm meaning.
  SORT_ORDER_BOTH = 3;
}
